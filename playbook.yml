---
- name: Bootstrap AI Headless Server
  hosts: localhost
  connection: local
  become: true
  vars:
    docker_apt_repo: "https://download.docker.com/linux/ubuntu"
    docker_gpg_url: "https://download.docker.com/linux/ubuntu/gpg"
    docker_packages:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    nvtop_repo: "ppa:flexiondotorg/nvtop"
    gpu_power_limit: 250
    target_user: "{{ target_user | default('root') }}"

  tasks:
    # --- 1. System Utilities & Dependencies ---
    - name: Install required apt dependencies and utilities
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - htop
          - tmux
          - ncdu
          - gdu
        state: present
        update_cache: yes

    # --- 2. UFW Firewall Configuration ---
    - name: Ensure UFW is installed
      apt:
        name: ufw
        state: present

    - name: Allow essential ports through UFW
      community.general.ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      loop:
        - "22"      # SSH
        - "11434"   # Ollama
        - "8000"    # vLLM
        - "5001"    # Dockge Web UI

    - name: Enable UFW with default deny incoming
      community.general.ufw:
        state: enabled
        policy: deny
        direction: incoming

    # --- 3. Nvidia Drivers & Utilities ---
    - name: Install ubuntu-drivers-common
      apt:
        name: ubuntu-drivers-common
        state: present
      tags: [gpu]

    - name: Autoinstall recommended NVIDIA drivers
      ansible.builtin.command: ubuntu-drivers autoinstall
      register: nvidia_autoinstall
      changed_when: '"Installing" in nvidia_autoinstall.stdout'
      tags: [gpu]

    - name: Add nvtop PPA
      ansible.builtin.apt_repository:
        repo: "{{ nvtop_repo }}"
        state: present
      tags: [gpu]

    - name: Install nvtop
      apt:
        name: nvtop
        state: present
        update_cache: yes
      tags: [gpu]

    # --- 4. Docker Engine Installation ---
    - name: Add Docker GPG key
      ansible.builtin.apt_key:
        url: "{{ docker_gpg_url }}"
        state: present

    - name: Get dpkg architecture
      ansible.builtin.command: dpkg --print-architecture
      register: dpkg_arch
      changed_when: false

    - name: Add Docker apt repository
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ dpkg_arch.stdout }}] {{ docker_apt_repo }} {{ ansible_facts['distribution_release'] }} stable"
        state: present
        filename: docker

    - name: Install Docker Engine
      apt:
        name: "{{ docker_packages }}"
        state: present
        update_cache: yes

    - name: Add user to docker group
      user:
        name: "{{ target_user }}"
        groups: docker
        append: yes

    # --- 5. Nvidia Container Toolkit ---
    - name: Add NVIDIA Container Toolkit GPG key
      ansible.builtin.apt_key:
        url: https://nvidia.github.io/libnvidia-container/gpgkey
        state: present
      tags: [gpu]

    - name: Add NVIDIA Container Toolkit repository
      ansible.builtin.apt_repository:
        repo: "deb https://nvidia.github.io/libnvidia-container/stable/ubuntu{{ ansible_distribution_version }}/$(ARCH) /"
        state: present
        filename: nvidia-container-toolkit
      tags: [gpu]

    - name: Install NVIDIA Container Toolkit
      apt:
        name: nvidia-container-toolkit
        state: present
        update_cache: yes
      tags: [gpu]

    - name: Configure Docker to use Nvidia runtime
      ansible.builtin.command: nvidia-ctk runtime configure --runtime=docker
      tags: [gpu]

    - name: Enable and restart Docker
      ansible.builtin.systemd:
        name: docker
        enabled: yes
        state: restarted

    # --- 6. GPU Power Limit Systemd Service ---
    - name: Copy custom gpu-limit.service to systemd
      template:
        src: templates/gpu-limit.service.j2
        dest: /etc/systemd/system/gpu-limit.service
        owner: root
        group: root
        mode: "0644"
      tags: [gpu]

    - name: Reload systemd daemon and enable gpu-limit
      ansible.builtin.systemd:
        daemon_reload: yes
        name: gpu-limit.service
        enabled: yes
        state: started
      tags: [gpu]

    # --- 7. Dockge Deployment ---
    - name: Create Dockge compose and data directories
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ target_user }}"
        group: docker
        mode: "0775"
      loop:
        - /opt/dockge
        - /opt/dockge/data
        - /opt/dockge/stacks
        - /opt/stacks

    - name: Copy Dockge docker-compose.yml
      copy:
        src: files/dockge-docker-compose.yml
        dest: /opt/dockge/compose.yaml
        owner: "{{ target_user }}"
        group: docker
        mode: "0644"

    - name: Deploy Dockge with Docker Compose V2
      ansible.builtin.command:
        cmd: docker compose up -d
        chdir: /opt/dockge
