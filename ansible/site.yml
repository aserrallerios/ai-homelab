---
- name: Bootstrap models-server host
  hosts: localhost # Note: Change to your target group (e.g., 'all' or 'models-server') if running from a separate machine
  become: true
  vars:
    docker_apt_repo: "https://download.docker.com/linux/ubuntu"
    docker_gpg_url: "https://download.docker.com/linux/ubuntu/gpg"
    docker_packages:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    nvtop_repo: "ppa:flexiondotorg/nvtop"
    gpu_power_limit: 250  # Default GPU power limit in watts

  tasks:
    # --- 1. System Utilities & Dependencies ---
    - name: Install required apt dependencies and utilities
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - htop
          - tmux
          - ncdu
          - gdu
        state: present
        update_cache: yes

    # --- 2. UFW Firewall Configuration ---
    - name: Ensure UFW is installed
      apt:
        name: ufw
        state: present

    - name: Set UFW default policy to deny incoming
      community.general.ufw:
        state: enabled
        policy: deny
        direction: incoming

    - name: Allow SSH (port 22)
      community.general.ufw:
        rule: allow
        port: 22
        proto: tcp

    - name: Allow Ollama API (port 11434)
      community.general.ufw:
        rule: allow
        port: 11434
        proto: tcp

    - name: Allow vLLM API (port 8000)
      community.general.ufw:
        rule: allow
        port: 8000
        proto: tcp

    - name: Allow Dockge Web UI (port 5001)
      community.general.ufw:
        rule: allow
        port: 5001
        proto: tcp

    # --- 3. Nvidia Drivers & Utilities ---
    - name: Install ubuntu-drivers-common
      apt:
        name: ubuntu-drivers-common
        state: present

    - name: Autoinstall recommended NVIDIA drivers
      ansible.builtin.command: ubuntu-drivers autoinstall
      register: nvidia_autoinstall
      changed_when: "'Installing' in nvidia_autoinstall.stdout"

    - name: Reboot after Nvidia driver installation (if changed)
      ansible.builtin.reboot:
      when: nvidia_autoinstall.changed

    - name: Add nvtop PPA
      ansible.builtin.apt_repository:
        repo: "{{ nvtop_repo }}"
        state: present

    - name: Install nvtop
      apt:
        name: nvtop
        state: present
        update_cache: yes

    # --- 4. Docker Engine Installation ---
    - name: Add Docker GPG key
      ansible.builtin.apt_key:
        url: "{{ docker_gpg_url }}"
        state: present

    - name: Add Docker apt repository
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64] {{ docker_apt_repo }} {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: Install Docker Engine
      apt:
        name: "{{ docker_packages }}"
        state: present
        update_cache: yes

    - name: Add user to docker group
      user:
        name: "{{ ansible_env.SUDO_USER | default(ansible_env.USER) }}"
        groups: docker
        append: yes

    # --- 5. Nvidia Container Toolkit ---
    - name: Add NVIDIA Container Toolkit GPG key
      ansible.builtin.apt_key:
        url: https://nvidia.github.io/libnvidia-container/gpgkey
        state: present

    - name: Add NVIDIA Container Toolkit repository
      ansible.builtin.apt_repository:
        repo: "deb https://nvidia.github.io/libnvidia-container/stable/ubuntu{{ ansible_distribution_version }}/$(ARCH) /"
        state: present
        filename: nvidia-container-toolkit

    - name: Install NVIDIA Container Toolkit
      apt:
        name: nvidia-container-toolkit
        state: present
        update_cache: yes

    - name: Configure Docker to use Nvidia runtime by default (Optional but recommended)
      ansible.builtin.command: nvidia-ctk runtime configure --runtime=docker
      notify: Restart Docker

    - name: Enable and ensure Docker is started
      ansible.builtin.systemd:
        name: docker
        enabled: yes
        state: started

    # --- 6. GPU Power Limit Systemd Service ---
    # Ensure you have gpu-limit.service.j2 in your templates directory
    - name: Copy custom gpu-limit.service to systemd
      template:
        src: gpu-limit.service.j2
        dest: /etc/systemd/system/gpu-limit.service
        owner: root
        group: root
        mode: '0644'

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: yes

    - name: Enable and start gpu-limit service
      ansible.builtin.systemd:
        name: gpu-limit.service
        enabled: yes
        state: started

    # --- 7. Dockge Deployment ---
    - name: Create Dockge compose and data directories
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ ansible_env.SUDO_USER | default(ansible_env.USER) }}"
        group: docker
        mode: '0775'
      loop:
        - /opt/dockge
        - /opt/dockge/data
        - /opt/dockge/stacks
        - /opt/stacks # The global stacks directory Dockge manages

    # Ensure you have dockge-docker-compose.yml in your files directory
    - name: Copy Dockge docker-compose.yml
      copy:
        src: dockge-docker-compose.yml
        dest: /opt/dockge/compose.yaml
        owner: "{{ ansible_env.SUDO_USER | default(ansible_env.USER) }}"
        group: docker
        mode: '0644'

    - name: Deploy Dockge with Docker Compose V2
      ansible.builtin.command:
        cmd: docker compose up -d
        chdir: /opt/dockge

  handlers:
    - name: Restart Docker
      ansible.builtin.systemd:
        name: docker
        state: restarted
